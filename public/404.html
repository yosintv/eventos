<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Event Countdown" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Default Meta Tags (will be replaced by React) -->
    <title>Event Countdown — Live Timers for Upcoming Events & Dates 2026</title>
    <meta name="description" content="Count down to the biggest events of 2026. Live countdown timers for movies, sports, music, gaming, and more. Never miss a date again." />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:title" content="Event Countdown — Live Timers for Upcoming Events & Dates 2026" />
    <meta property="og:description" content="Count down to the biggest events of 2026. Live countdown timers for movies, sports, music, gaming, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Event Countdown" />
    <meta property="og:image" content="https://via.placeholder.com/1200x630/000000/FFFFFF/?text=Event+Countdown" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Event Countdown — Live Timers" />
    <meta name="twitter:description" content="Count down to upcoming events with live timers." />
    <meta name="twitter:image" content="https://via.placeholder.com/1200x630/000000/FFFFFF/?text=Event+Countdown" />

    <!-- Favicon - Clock -->
    <link rel="icon" type="image/svg+xml" href="/countdown-clock.svg" />
    <link rel="apple-touch-icon" href="/countdown-clock.svg" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://i.days.to" />
    <link rel="dns-prefetch" href="https://www.youtube.com" />

    <script>
      // Single Page App (SPA) Router for GitHub Pages
      // This script handles routing for client-side navigation
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      }());
    </script>
  </head>
  <body>
    <script>
      // Store the requested URL in sessionStorage
      // This will be used by the main app to navigate to the correct route
      var pathName = window.location.pathname;
      var searchQuery = window.location.search;
      var hashValue = window.location.hash;

      // If we're on 404.html page, redirect to index.html with the path preserved
      if (pathName !== '/' && !pathName.includes('.')) {
        sessionStorage.redirect = pathName + searchQuery + hashValue;
        window.location.replace('/index.html');
      }
    </script>

    <!-- This will be served by GitHub Pages for any 404 route -->
    <!-- The above script redirects to index.html while preserving the path -->
    <div id="root"></div>
  </body>
</html>

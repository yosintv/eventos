<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#3B82F6" stroke="#1E40AF" stroke-width="8"/>

  <!-- Clock face background -->
  <circle cx="100" cy="100" r="85" fill="white"/>

  <!-- Hour markers -->
  <g stroke="#1E40AF" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="20" x2="100" y2="35"/>
    <line x1="100" y1="165" x2="100" y2="180"/>
    <line x1="180" y1="100" x2="165" y2="100"/>
    <line x1="35" y1="100" x2="20" y2="100"/>
  </g>

  <!-- Center circle -->
  <circle cx="100" cy="100" r="6" fill="#1E40AF"/>

  <!-- Hour hand -->
  <line x1="100" y1="100" x2="100" y2="50" stroke="#1E40AF" stroke-width="5" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="100" y1="100" x2="100" y2="35" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>

  <!-- Second hand -->
  <line x1="100" y1="100" x2="100" y2="30" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>

  <!-- Animated rotation effect (will be handled via CSS when favicon renders) -->
</svg>

name: Build & Deploy to GitHub Pages 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck || echo "TypeScript check completed"

      - name: Build project
        run: npm run build
        env:
          CI: true

      - name: Verify build output
        run: |
          echo "✓ Build output files:"
          ls -lh dist/ | head -15
          echo ""
          echo "✓ Checking critical files:"
          [ -f dist/index.html ] && echo "  ✓ index.html found" || echo "  ✗ index.html missing"
          [ -f dist/404.html ] && echo "  ✓ 404.html found" || echo "  ✗ 404.html missing"
          [ -f dist/sitemap.xml ] && echo "  ✓ sitemap.xml found" || echo "  ✗ sitemap.xml missing"
          [ -f dist/robots.txt ] && echo "  ✓ robots.txt found" || echo "  ✗ robots.txt missing"
          echo ""
          echo "✓ Sitemap contains $(grep -c '<url>' dist/sitemap.xml) URLs"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed!"
          echo "📱 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "⏰ Deployed at: $(date)"

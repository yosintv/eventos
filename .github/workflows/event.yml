name: Update API Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip curl_cffi

      - name: Refresh API files
        run: python scripts/event.py --start-page 1 --pages 25 --output-dir api

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- api/page*.json; then
            echo "No API changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/page*.json
          git commit -m "chore(api): daily refresh pages 1-25"
          git push
